<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>睿弈冰清 - 移动指挥终端</title>
    <style>
        body { background: #0a0e17; color: #00f0ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .cyber-box { background: rgba(0,20,40,0.8); border: 1px solid #00f0ff; padding: 40px 30px; border-radius: 8px; text-align: center; box-shadow: 0 0 30px rgba(0,240,255,0.15); width: 80%; max-width: 320px; }
        h2 { margin-top: 0; font-size: 20px; letter-spacing: 2px; }
        .hint { font-size: 12px; color: #6699cc; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 25px; background: rgba(0,240,255,0.05); border: 1px solid #00f0ff; color: #fff; text-align: center; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        button { width: 100%; padding: 14px; background: #00f0ff; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #00f0ff; }
        .sys-info { margin-top: 30px; font-size: 10px; color: #444; }
    </style>
</head>
<body>
    <div class="cyber-box">
        <h2>IOT 战区网关接入</h2>
        <div class="hint">请输入大屏右上角的动态边缘节点坐标</div>
        <input type="text" id="ipInput" placeholder="例如: 192.168.1.15">
        <button onclick="connectSystem()">强制接管控制权</button>
    </div>
    <div class="sys-info">SYS_VER: 5.0_PRO // AWAITING TARGET...</div>

    <script>
        function connectSystem() {
            let ip = document.getElementById("ipInput").value.trim();
            if(ip === "") {
                alert("指挥官，坐标不能为空！");
                return;
            }
            // 核心跳转逻辑：带着端口号杀向目标 IP
            window.location.href = "http://" + ip + ":5000";
        }
    </script>
</body>
</html>
